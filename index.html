<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>鍒嗛暅鍔╂墜 Storyboard-Copilot</title>
    <script>
      try {
        const persistedTheme = localStorage.getItem('theme-storage');
        const parsedTheme = persistedTheme ? JSON.parse(persistedTheme) : null;
        const theme = parsedTheme?.state?.theme;
        document.documentElement.classList.toggle('dark', theme === 'dark');
      } catch {
        document.documentElement.classList.remove('dark');
      }
    </script>
    <style>
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #f5f7fa;
        color: #1b2430;
      }

      html.dark,
      html.dark body,
      html.dark #root {
        background: #0b1118;
        color: #e8eff8;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
