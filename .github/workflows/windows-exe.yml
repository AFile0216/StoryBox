name: Build Windows EXE

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Auto bump patch version
        if: "${{ github.event_name == 'push' && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'chore(ci): auto bump version') }}"
        shell: pwsh
        run: |
          node scripts/auto-bump-version.mjs patch
          $version = node -p "require('./package.json').version"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore(ci): auto bump version to v$version [skip ci]"
            git push origin $env:GITHUB_REF_NAME
          } else {
            Write-Host "No version changes detected."
          }

      - name: Install dependencies
        run: npm ci

      - name: Build Windows NSIS installer
        run: npm run tauri -- build --bundles nsis

      - name: Rename installer artifact
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $installer = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No NSIS installer found under src-tauri/target/release/bundle/nsis"
          }
          $newName = "Storyboard-Copilot_${version}_x64-setup.exe"
          $newPath = Join-Path (Split-Path $installer.FullName) $newName
          Move-Item -Path $installer.FullName -Destination $newPath -Force
          Write-Host "Renamed installer to $newName"

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: storyboard-copilot-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
